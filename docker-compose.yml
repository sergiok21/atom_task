services:
  postgres-backend:
    image: postgres:17
    container_name: atom-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    volumes:
      - atom-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512M'
    ports:
      - '${POSTGRES_HOST}:${POSTGRES_PORT}:5432'
    networks:
      - default


volumes:
  atom-postgres-data:
    external: true


networks:
  default:
    external: true
    name: atom-network
